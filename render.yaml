services:
  - type: web
    name: us-debt-clock
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python api.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: FRED_KEY
        sync: false
      - key: PORT
        value: "8500"
    healthCheckPath: /health
    autoDeploy: true
